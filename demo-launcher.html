<!DOCTYPE html>
<html>
<head>
<title>Demo Launcher</title>
<style>
body {
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 600px;
    margin: 50px auto;
    padding: 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}
.card {
    background: white;
    color: #333;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
button {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    width: 100%;
    margin-top: 20px;
}
button:hover {
    opacity: 0.9;
    transform: scale(1.02);
}
h1 { margin-top: 0; }
.step {
    background: #f7fafc;
    padding: 15px;
    border-radius: 10px;
    margin: 15px 0;
    border-left: 4px solid #667eea;
}
</style>
</head>
<body>
<div class="card">
    <h1>🎯 Persona Big Five Demo</h1>

    <p>Klicka på knappen nedan för att öppna demon!</p>

    <button onclick="openDemo()">🚀 ÖPPNA DEMON</button>

    <div class="step" style="margin-top: 30px;">
        <strong>Alternativ:</strong> Om knappen inte fungerar, kopiera denna URL och klistra in i en ny flik:
        <br><br>
        <code style="word-break: break-all; background: white; padding: 5px; display: block; border-radius: 5px;">
        https://raw.githubusercontent.com/Marcwarn/chatbot/claude/personality-assessment-app-01DPbLhQT3Y5doG4v5gBJpXf/big-five-demo.html
        </code>
    </div>
</div>

<script>
function openDemo() {
    // Öppna GitHub raw URL i nytt fönster
    window.open('https://raw.githubusercontent.com/Marcwarn/chatbot/claude/personality-assessment-app-01DPbLhQT3Y5doG4v5gBJpXf/big-five-demo.html', '_blank');

    // Visa hjälptext efter 2 sekunder
    setTimeout(() => {
        alert('Demon öppnas i ny flik!\n\nOm sidan visar HTML-kod istället för demon:\n1. Tryck Cmd+S för att spara filen\n2. Dubbelklicka på den sparade filen\n3. Den öppnas i Safari/Chrome!');
    }, 500);
}
</script>
</body>
</html>
