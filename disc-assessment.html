// ─────────────────────────────────────────────
// DIMENSION DESCRIPTIONS
// ─────────────────────────────────────────────

    }

function getLevel(score) {
    if (score >= 65) return "high";
    if (score <= 35) return "low";
    return "mid";
}

// ─────────────────────────────────────────────
// PROFILE TYPE GENERATOR
// ─────────────────────────────────────────────
function generateProfileType(scores) {
    const dims = ["D", "I", "S", "C"];
    const sorted = dims.sort((a, b) => scores[b] - scores[a]);

    // Primary and secondary traits (score >= 60)
    const primary = sorted.filter(d => scores[d] >= 60);

    if (primary.length === 0) return "Balanserad profil";
    if (primary.length === 1) return DIM[primary[0]].sv;

    // Combine top 2
    return primary.slice(0, 2).map(d => d).join("");
}

function generateHeadline(scores) {
    const profile = generateProfileType(scores);
    const traits = [];

    if (scores.D >= 65) traits.push("resultatdriven");
    if (scores.I >= 65) traits.push("inspirerande");
    if (scores.S >= 65) traits.push("pålitlig");
    if (scores.C >= 65) traits.push("noggrann");

    if (traits.length === 0) return "En balanserad och anpassningsbar personlighet";
    if (traits.length === 1) return `En ${traits[0]} och engagerad personlighet`;
    const last = traits.pop();
    return `En ${traits.join(", ")} och ${last} personlighet`;
}

// ─────────────────────────────────────────────
// STATE

let view = "start";
let qIdx = 0;
let answers = {};
let scores = null;
let radarChart = null;
let consents = { data: false, ai: false, storage: true };
let sessionId = null;

// HTML escaping to prevent XSS attacks
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ─────────────────────────────────────────────
// VIEWS
// ─────────────────────────────────────────────

function consentItem(id, title, desc, required) {
    const checked = consents[id];
    return `
    <label class="flex items-start gap-4 bg-white border-2 rounded-2xl p-4 cursor-pointer transition-all ${checked ? "border-red-400 bg-red-50" : "border-gray-100"}">
        <input type="checkbox" ${checked?"checked":""} onchange="toggleConsent('${id}')" />
        <div>
            <div class="flex items-center gap-2">
                <span class="font-semibold text-gray-900 text-sm">${title}</span>
                <span class="tag text-xs ${required ? "bg-red-100 text-red-700" : "bg-gray-100 text-gray-600"}">${required?"Obligatorisk":"Valfri"}</span>
            </div>
            <p class="text-xs text-gray-500 mt-1">${desc}</p>
        </div>
    </label>`;
}

function renderQuestion() {
    const q = QUESTIONS[qIdx];
    const prog = ((qIdx + 1) / QUESTIONS.length) * 100;
    const d = DIM[q.dim];
    const LABELS = ["", "Stämmer inte alls", "Stämmer dåligt", "Neutral", "Stämmer ganska bra", "Stämmer helt"];

    return `

        <!-- Progress header -->
        <div class="sticky top-0 bg-white border-b z-10">
            <div class="px-4 pt-3 pb-2">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-semibold text-gray-500">FRÅGA ${qIdx+1} AV ${QUESTIONS.length}</span>
                    <span class="text-xs font-bold" style="color:${d.color}">${d.sv.toUpperCase()}</span>
                </div>
                <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                    <div class="h-full rounded-full progress-bar" style="width:${prog}%; background:linear-gradient(90deg,#FF4444,#FFD700)"></div>
                </div>
            </div>
        </div>

        <!-- Question card -->

                    <i data-lucide="${d.icon}" class="w-5 h-5" style="color:${d.color}"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-900 leading-snug">${escapeHtml(q.text)}</h2>
            </div>

            <!-- Likert scale -->

                ${[5,4,3,2,1].map(v=>`
                <button class="likert-btn ${answers[q.id]===v?"selected":""}" onclick="answer(${q.id},${v})">
                    <div class="w-9 h-9 rounded-xl flex items-center justify-center font-bold text-sm flex-shrink-0 transition-all"
                         style="background:${answers[q.id]===v ? d.color : "#f3f4f6"}; color:${answers[q.id]===v ? "white" : "#6b7280"}">
                        ${v}
                    </div>
                    <span class="font-medium text-sm ${answers[q.id]===v?"text-red-900":"text-gray-700"}">${LABELS[v]}</span>
                </button>`).join("")}
            </div>
        </div>

        <!-- Back button -->
        ${qIdx > 0 ? `
        <div class="px-4 pb-6">
            <button onclick="prevQ()" class="w-full py-3 rounded-xl bg-gray-100 text-gray-600 font-semibold text-sm card-hover">
                ← Föregående fråga
            </button>
        </div>` : ""}
    </div>`;
}

function calcScores() {
    const raw = { D:0, I:0, S:0, C:0 };
    const counts = { D:0, I:0, S:0, C:0 };

    QUESTIONS.forEach(q => {
        let v = answers[q.id] || 3;
        if (q.k === "-") v = 6 - v;
        raw[q.dim] += v;
        counts[q.dim]++;
    });

    const result = {};
    Object.keys(raw).forEach(d => {
        const mean = raw[d] / counts[d]; // 1–5
        result[d] = Math.round(((mean - 1) / 4) * 100); // 0–100
    });
    return result;
}

function openChat() {
    view = "chat";
    render();
    setTimeout(() => {

}

async function sendChatMessage(event) {
    event.preventDefault();

    const input = document.getElementById('chatInput');
    const message = input.value.trim();

    if (!message || isChatLoading) return;

    chatHistory.push({ role: 'user', content: message });
    input.value = '';
    isChatLoading = true;
    render();

    setTimeout(() => {
        const container = document.getElementById('chatMessages');
        if (container) container.scrollTop = container.scrollHeight;
    }, 50);

    try {
        const response = await callChatAPI(message);
        chatHistory.push({ role: 'assistant', content: response });
    } catch (error) {
        chatHistory.push({
            role: 'assistant',
            content: 'Tyvärr uppstod ett fel. Försök igen om en stund.'
        });
    } finally {
        isChatLoading = false;
        render();

        setTimeout(() => {
            const container = document.getElementById('chatMessages');
            if (container) container.scrollTop = container.scrollHeight;
        }, 50);
    }
}

async function callChatAPI(message) {
    if (!userId) {
        userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    const history = chatHistory
        .filter(msg => msg.role !== 'user' || msg.content !== message)
        .map(msg => ({
            role: msg.role,
            content: msg.content
        }));

    try {
        const response = await fetch('/disc/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                user_id: userId,
                message: message,
                disc_scores: scores,
                conversation_history: history,
                session_id: sessionId
            })
        });

        if (!response.ok) {
            throw new Error(`API error: ${response.status}`);
        }

        const data = await response.json();
        return data.response;
    } catch (error) {
        console.error('Chat API error:', error);
        return mockChatFallback(message, scores);
    }
}

function mockChatFallback(message, scores) {
    const lowerMsg = message.toLowerCase();

    if (lowerMsg.includes('jobb') || lowerMsg.includes('roll')) {
        const careers = getCareerSuggestions(scores);
        return `Baserat på din DISC-profil passar dessa roller dig:\n\n${careers.map(c => `• ${c}`).join('\n')}\n\nVill du veta mer om någon av dessa?`;
    }

    if (lowerMsg.includes('team') || lowerMsg.includes('samarbete')) {
        const teamRole = getTeamRole(scores);
        return `I team:\n\n${teamRole}\n\nVill du veta mer om hur du kan arbeta med olika DISC-typer?`;
    }

    return `Tack för din fråga! Baserat på din DISC-profil (D:${Math.round(scores.D)}, I:${Math.round(scores.I)}, S:${Math.round(scores.S)}, C:${Math.round(scores.C)}) kan jag hjälpa dig med karriärval, teamdynamik, eller kommunikationstips. Vad vill du veta mer om?`;
}

            const data = await response.json();
            sessionId = data.session_id;
        }
    } catch (error) {
        console.error('Failed to initialize session:', error);
    }

    view = "question";
    render();
}

function answer(id, val) {
    answers[id] = val;
    setTimeout(() => {
        if (qIdx < QUESTIONS.length - 1) {
            qIdx++;
            render();
        } else {
            scores = calcScores();

            // Send results to backend
            sendResultsToBackend();

            view = "results";
            render();
        }
    }, 280);
}

async function sendResultsToBackend() {
    try {
        await fetch('/disc/complete', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                user_id: userId,
                session_id: sessionId,
                answers: answers,
                scores: scores
            })
        });
    } catch (error) {
        console.error('Failed to send results:', error);
    }
}

function prevQ() {
    if (qIdx > 0) { qIdx--; render(); }
}

function restart() {
    answers = {};
    scores = null;
    qIdx = 0;
    chatHistory = [];
    view = "start";
    render();
}

function share() {
    const dims = ["D","I","S","C"];
    const lines = dims.map(d => `${DIM[d].sv}: ${Math.round(scores[d])}/100`).join("\n");
    const profileType = generateProfileType(scores);
    const text = `Min ${BRAND} DISC-profil: ${profileType}\n\n${lines}\n\nGör analysen på persona.app`;

    if (navigator.share) {
        navigator.share({ title: "Min DISC-profil", text });
    } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
            alert("Kopierat till urklipp! ✓");
        });
    } else {
        alert(text);
    }
}

// ─────────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────────

function render() {
    const app = document.getElementById("app");
    if (view === "start")     app.innerHTML = renderStart();
    if (view === "consent")   app.innerHTML = renderConsent();
    if (view === "question")  app.innerHTML = renderQuestion();
    if (view === "chat")      app.innerHTML = renderChat();
    if (view === "results") {
        app.innerHTML = renderResults();
        drawChart(scores);
    }
    if (typeof lucide !== "undefined") lucide.createIcons();
    window.scrollTo({ top: 0, behavior: "smooth" });
}
render();
</script>
</body>
