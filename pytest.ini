[pytest]
# Pytest configuration for Persona Security Test Suite

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    # Coverage options (uncomment when running with --cov)
    # --cov=.
    # --cov-report=html
    # --cov-report=term-missing
    # --cov-fail-under=70

# Markers for test categorization
markers =
    critical: Critical security vulnerability tests (9 tests)
    high: High severity vulnerability tests (5 tests)
    medium: Medium severity vulnerability tests (8 tests)
    security: All security tests
    integration: End-to-end integration tests
    performance: Performance and load tests
    slow: Tests that take > 5 seconds
    requires_api_key: Tests that require ANTHROPIC_API_KEY

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (prevent hanging)
timeout = 300
timeout_method = thread

# Console output
console_output_style = progress

# Minimum Python version
minversion = 3.10

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
