<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Persona - Big Five Personlighetstest</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overscroll-behavior: none;
            touch-action: pan-y;
        }

        .card-hover:active {
            transform: scale(0.98);
            transition: transform 0.1s;
        }

        .slide-in-right {
            animation: slideInRight 0.3s ease-out;
        }

        .slide-in-left {
            animation: slideInLeft 0.3s ease-out;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .likert-button {
            transition: all 0.2s;
        }

        .likert-button.selected {
            transform: scale(1.05);
        }

        .progress-bar {
            transition: width 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app" class="max-w-2xl mx-auto bg-white min-h-screen"></div>

    <script>
        // Brand Name
        const BRAND_NAME = "Persona"; // Ändra till ditt valda brand

        // Big Five Questions (IPIP-50) - Simplified for demo
        const BIG_FIVE_QUESTIONS = [
            // Extraversion
            { id: 1, text: "Jag är själens levande på festen", dimension: "E", keyed: "plus" },
            { id: 2, text: "Jag pratar inte särskilt mycket", dimension: "E", keyed: "minus" },
            { id: 3, text: "Jag känner mig bekväm med andra människor", dimension: "E", keyed: "plus" },
            { id: 4, text: "Jag håller mig i bakgrunden", dimension: "E", keyed: "minus" },
            { id: 5, text: "Jag startar konversationer", dimension: "E", keyed: "plus" },

            // Agreeableness
            { id: 6, text: "Jag är intresserad av andra människor", dimension: "A", keyed: "plus" },
            { id: 7, text: "Jag förolämpar andra", dimension: "A", keyed: "minus" },
            { id: 8, text: "Jag bryr mig om andras känslor", dimension: "A", keyed: "plus" },
            { id: 9, text: "Jag är inte intresserad av andras problem", dimension: "A", keyed: "minus" },
            { id: 10, text: "Jag har ett varmt hjärta", dimension: "A", keyed: "plus" },

            // Conscientiousness
            { id: 11, text: "Jag är alltid förberedd", dimension: "C", keyed: "plus" },
            { id: 12, text: "Jag lämnar mina saker överallt", dimension: "C", keyed: "minus" },
            { id: 13, text: "Jag uppmärksammar detaljer", dimension: "C", keyed: "plus" },
            { id: 14, text: "Jag gör en röra av saker", dimension: "C", keyed: "minus" },
            { id: 15, text: "Jag slutför uppgifter direkt", dimension: "C", keyed: "plus" },

            // Neuroticism
            { id: 16, text: "Jag blir lätt upprörd", dimension: "N", keyed: "plus" },
            { id: 17, text: "Jag är avslappnad större delen av tiden", dimension: "N", keyed: "minus" },
            { id: 18, text: "Jag oroar mig för saker", dimension: "N", keyed: "plus" },
            { id: 19, text: "Jag blir sällan stressad", dimension: "N", keyed: "minus" },
            { id: 20, text: "Jag blir lätt irriterad", dimension: "N", keyed: "plus" },

            // Openness
            { id: 21, text: "Jag har en livlig fantasi", dimension: "O", keyed: "plus" },
            { id: 22, text: "Jag har svårt att förstå abstrakta idéer", dimension: "O", keyed: "minus" },
            { id: 23, text: "Jag har utmärkta idéer", dimension: "O", keyed: "plus" },
            { id: 24, text: "Jag har inte särskilt bra fantasi", dimension: "O", keyed: "minus" },
            { id: 25, text: "Jag är snabb på att förstå saker", dimension: "O", keyed: "plus" },
        ];

        const DIMENSIONS = {
            E: { name: "Extraversion", color: "#EF4444", icon: "users" },
            A: { name: "Vänlighet", color: "#10B981", icon: "heart" },
            C: { name: "Samvetsgrannhet", color: "#6366F1", icon: "target" },
            N: { name: "Emotionell Stabilitet", color: "#F59E0B", icon: "brain" },
            O: { name: "Öppenhet", color: "#EC4899", icon: "lightbulb" }
        };

        // State
        let currentView = "start";
        let currentQuestionIndex = 0;
        let answers = {};
        let result = null;
        let consents = { data: false, ai: false, storage: true };

        // Render functions...
        function renderStart() {
            return `
                <div class="min-h-screen bg-gradient-to-b from-indigo-50 via-white to-pink-50 fade-in">
                    <div class="px-4 py-8">
                        <div class="text-center mb-8">
                            <div class="w-20 h-20 bg-gradient-to-br from-indigo-600 to-pink-600 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-xl">
                                <i data-lucide="brain" class="w-10 h-10 text-white"></i>
                            </div>
                            <h1 class="text-4xl font-bold text-gray-900 mb-2">${BRAND_NAME}</h1>
                            <p class="text-lg text-gray-600">Big Five Personlighetstest</p>
                        </div>

                        <div class="bg-white rounded-3xl p-6 shadow-lg mb-6">
                            <h2 class="text-2xl font-bold text-gray-900 mb-4">Vetenskapligt Validerat</h2>
                            <p class="text-gray-600 leading-relaxed mb-4">
                                Detta test använder <strong>IPIP (International Personality Item Pool)</strong> - ett validerat instrument som används i psykologisk forskning världen över.
                            </p>

                            <div class="space-y-3">
                                <div class="flex items-start gap-3">
                                    <div class="w-6 h-6 bg-green-100 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">
                                        <i data-lucide="check" class="w-4 h-4 text-green-600"></i>
                                    </div>
                                    <span class="text-gray-700">25 validerade frågor</span>
                                </div>
                                <div class="flex items-start gap-3">
                                    <div class="w-6 h-6 bg-green-100 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">
                                        <i data-lucide="check" class="w-4 h-4 text-green-600"></i>
                                    </div>
                                    <span class="text-gray-700">Cirka 5-10 minuter</span>
                                </div>
                                <div class="flex items-start gap-3">
                                    <div class="w-6 h-6 bg-green-100 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">
                                        <i data-lucide="check" class="w-4 h-4 text-green-600"></i>
                                    </div>
                                    <span class="text-gray-700">GDPR-säker datahantering</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-2xl p-5 mb-6">
                            <div class="flex items-start gap-3">
                                <i data-lucide="info" class="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5"></i>
                                <div class="text-sm text-amber-900">
                                    <strong>Viktig information:</strong> Detta test är för självkännedom och personlig utveckling. Det är inte avsett för klinisk diagnos eller rekrytering.
                                </div>
                            </div>
                        </div>

                        <button onclick="showConsent()" class="w-full bg-gradient-to-r from-indigo-600 to-pink-600 text-white rounded-2xl py-5 font-bold text-lg shadow-xl card-hover">
                            Starta Test
                        </button>
                    </div>
                </div>
            `;
        }

        function renderConsent() {
            const allRequired = consents.data && consents.ai;
            return `
                <div class="min-h-screen bg-gradient-to-b from-indigo-50 to-white slide-in-right pb-32">
                    <div class="bg-white border-b sticky top-0 z-10">
                        <div class="px-4 py-4 flex items-center gap-3">
                            <button onclick="currentView='start'; render();" class="p-2 -ml-2 card-hover rounded-full">
                                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                            </button>
                            <h1 class="text-xl font-bold">Samtycke (GDPR)</h1>
                        </div>
                    </div>

                    <div class="px-4 py-6 space-y-4">
                        ${renderConsentItem('data', 'Databehandling', 'Obligatoriskt', true)}
                        ${renderConsentItem('ai', 'Analys av svar', 'Obligatoriskt', true)}
                        ${renderConsentItem('storage', 'Lagring (365 dagar)', 'Valfritt', false)}
                    </div>

                    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 max-w-2xl mx-auto">
                        <button
                            onclick="${allRequired ? 'startTest()' : ''}"
                            class="w-full py-4 rounded-xl font-bold text-lg ${allRequired ? 'bg-indigo-600 text-white card-hover' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}"
                            ${!allRequired ? 'disabled' : ''}
                        >
                            ${allRequired ? 'Acceptera och fortsätt' : 'Acceptera obligatoriska'}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderConsentItem(id, title, subtitle, required) {
            const checked = consents[id];
            return `
                <button onclick="toggleConsent('${id}')" class="w-full bg-white rounded-2xl p-5 shadow-sm border border-gray-100 card-hover text-left">
                    <div class="flex items-start gap-4">
                        <div class="w-6 h-6 rounded-lg border-2 flex items-center justify-center ${checked ? 'bg-indigo-600 border-indigo-600' : 'border-gray-300'}">
                            ${checked ? '<i data-lucide="check" class="w-4 h-4 text-white"></i>' : ''}
                        </div>
                        <div class="flex-1">
                            <div class="font-semibold text-gray-900">${title}</div>
                            <div class="text-sm text-gray-600">${subtitle}</div>
                        </div>
                    </div>
                </button>
            `;
        }

        function renderQuestion() {
            const question = BIG_FIVE_QUESTIONS[currentQuestionIndex];
            const progress = ((currentQuestionIndex + 1) / BIG_FIVE_QUESTIONS.length) * 100;

            return `
                <div class="min-h-screen bg-gradient-to-b from-white to-gray-50 ${currentQuestionIndex === 0 ? 'slide-in-right' : ''}">
                    <!-- Progress -->
                    <div class="bg-white border-b sticky top-0 z-10">
                        <div class="px-4 py-4">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm font-medium text-gray-600">Fråga ${currentQuestionIndex + 1} av ${BIG_FIVE_QUESTIONS.length}</span>
                                <span class="text-sm font-medium text-indigo-600">${Math.round(progress)}%</span>
                            </div>
                            <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-indigo-600 to-pink-600 progress-bar" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Question -->
                    <div class="px-4 py-8">
                        <div class="bg-white rounded-3xl p-6 shadow-lg mb-6">
                            <div class="text-center">
                                <div class="text-sm font-medium text-${DIMENSIONS[question.dimension].color.replace('#', '')} mb-2">
                                    ${DIMENSIONS[question.dimension].name}
                                </div>
                                <h2 class="text-2xl font-bold text-gray-900 leading-snug">
                                    ${question.text}
                                </h2>
                            </div>
                        </div>

                        <!-- Likert Scale -->
                        <div class="space-y-3">
                            ${[5,4,3,2,1].map(value => `
                                <button
                                    onclick="answerQuestion(${question.id}, ${value})"
                                    class="w-full bg-white rounded-2xl p-5 shadow-sm border-2 ${answers[question.id] === value ? 'border-indigo-600 bg-indigo-50' : 'border-gray-100'} card-hover text-left likert-button ${answers[question.id] === value ? 'selected' : ''}"
                                >
                                    <div class="flex items-center gap-4">
                                        <div class="w-10 h-10 rounded-full ${answers[question.id] === value ? 'bg-indigo-600' : 'bg-gray-100'} flex items-center justify-center flex-shrink-0">
                                            <span class="text-lg font-bold ${answers[question.id] === value ? 'text-white' : 'text-gray-600'}">${value}</span>
                                        </div>
                                        <span class="font-medium ${answers[question.id] === value ? 'text-indigo-900' : 'text-gray-700'}">
                                            ${['Stämmer inte alls', 'Stämmer dåligt', 'Neutral', 'Stämmer ganska bra', 'Stämmer helt'][5-value]}
                                        </span>
                                    </div>
                                </button>
                            `).join('')}
                        </div>

                        <!-- Navigation -->
                        <div class="flex gap-3 mt-6">
                            ${currentQuestionIndex > 0 ? `
                                <button onclick="previousQuestion()" class="flex-1 bg-gray-100 text-gray-700 rounded-xl py-4 font-semibold card-hover">
                                    Tillbaka
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderResults() {
            return `
                <div class="min-h-screen bg-gradient-to-b from-white to-gray-50 slide-in-right pb-8">
                    <div class="bg-gradient-to-r from-indigo-600 to-pink-600 text-white">
                        <div class="px-4 py-8">
                            <div class="text-center">
                                <div class="w-16 h-16 bg-white/20 backdrop-blur-sm rounded-2xl mx-auto mb-4 flex items-center justify-center">
                                    <i data-lucide="check-circle" class="w-8 h-8 text-white"></i>
                                </div>
                                <h1 class="text-3xl font-bold mb-2">Klart!</h1>
                                <p class="text-white/90">Din Big Five profil är klar</p>
                            </div>
                        </div>
                    </div>

                    <div class="px-4 py-6 space-y-6 -mt-4">
                        <!-- Scores -->
                        <div class="bg-white rounded-3xl p-6 shadow-lg">
                            <h2 class="text-xl font-bold mb-6">Dina Resultat</h2>
                            <div class="space-y-4">
                                ${Object.keys(result.scores).map(dim => {
                                    const score = result.scores[dim];
                                    return `
                                        <div>
                                            <div class="flex justify-between mb-2">
                                                <span class="font-semibold text-gray-900">${DIMENSIONS[dim].name}</span>
                                                <span class="text-indigo-600 font-bold">${score.toFixed(0)}%</span>
                                            </div>
                                            <div class="h-3 bg-gray-100 rounded-full overflow-hidden">
                                                <div class="h-full rounded-full" style="width: ${score}%; background-color: ${DIMENSIONS[dim].color}"></div>
                                            </div>
                                            <p class="text-sm text-gray-600 mt-1">${score > 65 ? 'Hög' : score < 35 ? 'Låg' : 'Medel'}</p>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Share -->
                        <button onclick="alert('Share funktion (demo)')" class="w-full bg-indigo-600 text-white rounded-2xl py-5 font-bold card-hover shadow-lg">
                            Dela Resultat
                        </button>

                        <button onclick="location.reload()" class="w-full bg-gray-100 text-gray-700 rounded-2xl py-4 font-semibold card-hover">
                            Gör Nytt Test
                        </button>
                    </div>
                </div>
            `;
        }

        // Navigation
        function showConsent() {
            currentView = "consent";
            render();
        }

        function toggleConsent(id) {
            consents[id] = !consents[id];
            render();
        }

        function startTest() {
            currentView = "question";
            currentQuestionIndex = 0;
            answers = {};
            render();
        }

        function answerQuestion(questionId, value) {
            answers[questionId] = value;

            // Auto-advance after selection
            setTimeout(() => {
                if (currentQuestionIndex < BIG_FIVE_QUESTIONS.length - 1) {
                    currentQuestionIndex++;
                    render();
                } else {
                    calculateResults();
                }
            }, 300);
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                render();
            }
        }

        function calculateResults() {
            // Calculate scores for each dimension
            const scores = {};
            ['E', 'A', 'C', 'N', 'O'].forEach(dim => {
                const dimQuestions = BIG_FIVE_QUESTIONS.filter(q => q.dimension === dim);
                let total = 0;

                dimQuestions.forEach(q => {
                    let score = answers[q.id] || 3;
                    if (q.keyed === 'minus') {
                        score = 6 - score; // Reverse scoring
                    }
                    total += score;
                });

                const mean = total / dimQuestions.length;
                scores[dim] = ((mean - 1) / 4) * 100; // Convert to 0-100
            });

            result = { scores };
            currentView = "results";
            render();
        }

        function render() {
            const app = document.getElementById('app');

            let html = '';
            if (currentView === 'start') html = renderStart();
            else if (currentView === 'consent') html = renderConsent();
            else if (currentView === 'question') html = renderQuestion();
            else if (currentView === 'results') html = renderResults();

            app.innerHTML = html;
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
