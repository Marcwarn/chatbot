<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Persona - Big Five Personlighetstest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { overscroll-behavior: none; touch-action: pan-y; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .card-hover:active { transform: scale(0.98); transition: transform 0.1s; }
        .slide-in-right { animation: slideInRight 0.3s ease-out; }
        .slide-in-up { animation: slideInUp 0.4s ease-out; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .progress-bar { transition: width 0.4s ease-out; }
        .dim-bar { transition: width 0.8s ease-out; }
        .likert-btn { transition: all 0.15s ease; border: 2px solid #e5e7eb; background: white; border-radius: 16px; padding: 14px 20px; width: 100%; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 14px; }
        .likert-btn:active { transform: scale(0.98); }
        .likert-btn.selected { border-color: #6366F1; background: #EEF2FF; }
        .radar-container { position: relative; max-width: 320px; margin: 0 auto; }
        .dim-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid #f3f4f6; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .score-bar-bg { background: #f3f4f6; border-radius: 999px; height: 10px; overflow: hidden; }
        .score-bar-fill { height: 100%; border-radius: 999px; }
        .tag { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .insights-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; padding: 20px; color: white; }
        input[type=checkbox] { width: 22px; height: 22px; border-radius: 6px; accent-color: #6366F1; cursor: pointer; flex-shrink: 0; }
    </style>
</head>
<body class="bg-gray-50">
<div id="app" class="max-w-lg mx-auto bg-white min-h-screen shadow-xl"></div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const BRAND = "Persona";

const DIM = {
    E: { name: "Extraversion",        sv: "Extraversion",         color: "#6366F1", light: "#EEF2FF", icon: "users" },
    A: { name: "Agreeableness",       sv: "Vänlighet",            color: "#10B981", light: "#ECFDF5", icon: "heart" },
    C: { name: "Conscientiousness",   sv: "Samvetsgrannhet",      color: "#F59E0B", light: "#FFFBEB", icon: "target" },
    N: { name: "Neuroticism",         sv: "Emotionell stabilitet", color: "#EF4444", light: "#FEF2F2", icon: "activity" },
    O: { name: "Openness",            sv: "Öppenhet",             color: "#8B5CF6", light: "#F5F3FF", icon: "lightbulb" }
};

// ─────────────────────────────────────────────
// IPIP-50 QUESTIONS (Swedish, validated)
// ─────────────────────────────────────────────
const QUESTIONS = [

    { id:11, text:"Jag bryr mig genuint om andras välmående",           dim:"A", k:"+" },

    { id:13, text:"Jag förstår andras känslor",                         dim:"A", k:"+" },

    { id:19, text:"Jag skapar en bekväm stämning runt mig",             dim:"A", k:"+" },
    { id:20, text:"Jag är svår att lära känna på djupet",               dim:"A", k:"-" },

    // CONSCIENTIOUSNESS
    { id:21, text:"Jag är alltid väl förberedd",                        dim:"C", k:"+" },
    { id:22, text:"Jag lämnar saker och ting i oordning",               dim:"C", k:"-" },
    { id:23, text:"Jag uppmärksammar detaljer noga",                    dim:"C", k:"+" },
    { id:24, text:"Jag skapar lätt röra hemma och på jobbet",           dim:"C", k:"-" },
    { id:25, text:"Jag slutför uppgifter snabbt och direkt",            dim:"C", k:"+" },
    { id:26, text:"Jag skjuter upp saker på framtiden",                 dim:"C", k:"-" },
    { id:27, text:"Jag arbetar systematiskt och följer en plan",        dim:"C", k:"+" },
    { id:28, text:"Jag missar ibland viktiga deadlines",                dim:"C", k:"-" },
    { id:29, text:"Jag avslutar alltid det jag börjar",                 dim:"C", k:"+" },
    { id:30, text:"Jag gör inte mer än vad som absolut krävs",         dim:"C", k:"-" },

    // NEUROTICISM
    { id:31, text:"Jag blir lätt upprörd eller stressad",               dim:"N", k:"+" },
    { id:32, text:"Jag är avslappnad de flesta dagar",                  dim:"N", k:"-" },
    { id:33, text:"Jag oroar mig ofta för saker",                       dim:"N", k:"+" },
    { id:34, text:"Jag blir sällan stressad",                           dim:"N", k:"-" },
    { id:35, text:"Jag kan bli irriterad snabbt",                       dim:"N", k:"+" },
    { id:36, text:"Jag hanterar stress bra",                            dim:"N", k:"-" },
    { id:37, text:"Jag har humörsvängningar",                           dim:"N", k:"+" },
    { id:38, text:"Jag störs sällan av oro eller ångest",               dim:"N", k:"-" },
    { id:39, text:"Jag kan bli melankolisk eller nedstämd",             dim:"N", k:"+" },
    { id:40, text:"Jag är känslomässigt stabil och jämn",               dim:"N", k:"-" },

    // OPENNESS
    { id:41, text:"Jag har en livlig och aktiv fantasi",                dim:"O", k:"+" },
    { id:42, text:"Jag har ibland svårt att förstå abstrakta idéer",    dim:"O", k:"-" },
    { id:43, text:"Jag har intressanta och originella idéer",           dim:"O", k:"+" },
    { id:44, text:"Jag saknar stark kreativ fantasi",                   dim:"O", k:"-" },
    { id:45, text:"Jag lär mig snabbt och förstår saker lätt",          dim:"O", k:"+" },
    { id:46, text:"Jag föredrar konkreta fakta framför teorier",        dim:"O", k:"-" },
    { id:47, text:"Jag gillar att reflektera och leka med idéer",       dim:"O", k:"+" },
    { id:48, text:"Jag är inte alltid intresserad av konst och kultur", dim:"O", k:"-" },
    { id:49, text:"Jag är nyfiken på allt möjligt",                     dim:"O", k:"+" },
    { id:50, text:"Jag föredrar rutiner framför nya erfarenheter",      dim:"O", k:"-" },
];

// ─────────────────────────────────────────────
// DIMENSION DESCRIPTIONS
// ─────────────────────────────────────────────
const DESC = {
    E: {
        high: { tag:"Extrovert", text:"Du drar energi från att vara med andra. Du är social, pratsam och trivs naturligt i centrum. Du tar gärna initiativ och skapar kontakter med lätthet." },
        mid:  { tag:"Ambivert",  text:"Du är bekväm i både sociala och ensamma sammanhang. Du anpassar dig väl till situationen och behöver balans mellan umgänge och tid för dig själv." },
        low:  { tag:"Introvert", text:"Du laddar dina batterier genom ensamtid och reflektion. Du är tankfull och lyssnar mer än du pratar – och dina relationer är djupa snarare än breda." }
    },
    A: {
        high: { tag:"Samarbetsvillig", text:"Du är empatisk, omtänksam och genuint intresserad av andra. Du värdesätter harmoni och samarbete högt och är en person som folk lätt vänder sig till." },
        mid:  { tag:"Balanserad",      text:"Du balanserar samarbete med självhävdelse. Du är empatisk men kan sätta dina egna behov och navigerar sociala situationer med pragmatism." },
        low:  { tag:"Självständig",    text:"Du är direkt, självständig och konkurrensorienterad. Du ifrågasätter gärna och sätter din egen agenda. Du värderar ärlighet framför diplomati." }
    },
    C: {
        high: { tag:"Organiserad",   text:"Du är strukturerad, pålitlig och målfokuserad. Du planerar noggrant, följer igenom på åtaganden och levererar konsekvent hög kvalitet." },
        mid:  { tag:"Flexibel",      text:"Du kan vara organiserad när det behövs, men är inte rigid. Du balanserar struktur med flexibilitet beroende på vad situationen kräver." },
        low:  { tag:"Spontan",       text:"Du är spontan, flexibel och kreativ. Du trivs med frihet och undviker rigid planering. Du är adaptiv men kan behöva stöttning med struktur." }
    },
    N: {
        // Note: N scores are inverted for display – high N = low emotional stability
        high: { tag:"Känslosam",    text:"Du är känslomässigt lyhörd och sensitiv. Du upplever djupa känslor och kan vara mer påverkad av stress. Din empatiska förmåga är en styrka." },
        mid:  { tag:"Balanserad",   text:"Du hanterar stress relativt bra men kan påverkas av svåra situationer. Du har en normal och hälsosam känslomässig variation." },
        low:  { tag:"Stabil",       text:"Du är lugn och samlad under press. Du återhämtar dig snabbt från motgångar och behåller lugnet i stressiga situationer – en stark tillgång i team." }
    },
    O: {
        high: { tag:"Kreativ",       text:"Du är nyfiken, kreativ och öppen för nya erfarenheter. Du söker djup och mening, uppskattar idéer och tänker gärna utanför boxen." },
        mid:  { tag:"Pragmatisk",    text:"Du är pragmatisk men öppen för nya idéer. Du balanserar tradition och innovation och värderar det som bevisligen fungerar." },
        low:  { tag:"Traditionell",  text:"Du är praktisk, konkret och traditionell. Du föredrar beprövade metoder och trivs med rutiner. Du är jordnära och fokuserad på resultat." }
    }
};

function getLevel(score) {
    if (score >= 65) return "high";
    if (score <= 35) return "low";
    return "mid";
}

function getNScore(rawScore) {
    // For display, invert N (neuroticism → emotional stability display)
    return 100 - rawScore;
}

// ─────────────────────────────────────────────
// PROFILE HEADLINE GENERATOR
// ─────────────────────────────────────────────
function generateHeadline(scores) {
    const traits = [];
    if (scores.O >= 65) traits.push("kreativ");
    if (scores.C >= 65) traits.push("strukturerad");
    if (scores.E >= 65) traits.push("social");
    if (scores.A >= 65) traits.push("empatisk");
    if (getNScore(scores.N) >= 65) traits.push("stabil");

    if (scores.O < 35) traits.push("praktisk");
    if (scores.C < 35) traits.push("spontan");
    if (scores.E < 35) traits.push("reflekterad");
    if (scores.A < 35) traits.push("självständig");

    if (traits.length === 0) return "Balanserad och mångsidig personlighet";
    if (traits.length === 1) return `En ${traits[0]} och balanserad personlighet`;
    const last = traits.pop();
    return `En ${traits.join(", ")} och ${last} personlighet`;
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let view = "start";
let qIdx = 0;
let answers = {};
let scores = null;
let radarChart = null;
let consents = { data: false, ai: false, storage: true };

// ─────────────────────────────────────────────
// VIEWS
// ─────────────────────────────────────────────
function renderStart() {
    return `
    <div class="min-h-screen fade-in" style="background: linear-gradient(160deg, #EEF2FF 0%, #F5F3FF 40%, #ECFDF5 100%)">
        <div class="px-5 py-10">
            <div class="text-center mb-8">
                <div class="w-20 h-20 rounded-3xl mx-auto mb-5 flex items-center justify-center shadow-xl"
                     style="background: linear-gradient(135deg, #6366F1, #8B5CF6)">
                    <i data-lucide="brain" class="w-10 h-10 text-white"></i>
                </div>
                <h1 class="text-4xl font-black text-gray-900 mb-1">${BRAND}</h1>
                <p class="text-gray-500 font-medium">Big Five Personlighetstest</p>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-md mb-4">
                <h2 class="text-xl font-bold text-gray-900 mb-3">Vetenskapligt validerat</h2>
                <p class="text-gray-600 text-sm leading-relaxed mb-4">
                    Baserat på <strong>IPIP (International Personality Item Pool)</strong> — ett av världens mest använda och validerade psykometriska instrument för Big Five.
                </p>
                <div class="space-y-2">
                    ${[["50 validerade IPIP-frågor","check"],["Ca 10 minuter","clock"],["GDPR-säker datahantering","shield"],["Vetenskaplig poängsättning med percentiler","bar-chart-2"]].map(([t,ic])=>`
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center flex-shrink-0">
                            <i data-lucide="${ic}" class="w-4 h-4 text-green-600"></i>
                        </div>
                        <span class="text-gray-700 text-sm font-medium">${t}</span>
                    </div>`).join("")}
                </div>
            </div>

            <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-6 flex gap-3">
                <i data-lucide="info" class="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5"></i>
                <p class="text-amber-900 text-xs leading-relaxed">
                    <strong>Obs:</strong> Detta test är för självkännedom och personlig utveckling. Det är inte avsett för klinisk diagnos eller rekryteringsändamål.
                </p>
            </div>

            <button onclick="go('consent')"
                class="w-full text-white py-5 rounded-2xl font-bold text-lg shadow-xl card-hover"
                style="background: linear-gradient(135deg, #6366F1, #8B5CF6)">
                Starta test
            </button>
            <p class="text-center text-gray-400 text-xs mt-3">OCEAN · Big Five · IPIP-50</p>
        </div>
    </div>`;
}

function renderConsent() {
    const ok = consents.data && consents.ai;
    return `
    <div class="min-h-screen bg-white slide-in-right">
        <div class="sticky top-0 bg-white border-b z-10">
            <div class="px-4 py-4 flex items-center gap-3">
                <button onclick="go('start')" class="p-2 -ml-2 card-hover rounded-full">
                    <i data-lucide="arrow-left" class="w-5 h-5 text-gray-700"></i>
                </button>
                <div>
                    <h1 class="text-lg font-bold text-gray-900">Samtycke & integritet</h1>
                    <p class="text-xs text-gray-500">GDPR-skyddad information</p>
                </div>
            </div>
        </div>

        <div class="px-4 py-5 space-y-3 pb-32">
            <p class="text-sm text-gray-600 mb-4">Vi behöver ditt samtycke innan vi kan genomföra testet. Du kan när som helst begära att få dina uppgifter raderade.</p>

            ${consentItem("data", "Databehandling", "Dina svar behandlas för att beräkna din personlighetsprofil.", true)}
            ${consentItem("ai", "Analysbearbetning", "Algoritmisk analys används för att generera psykometrisk återkoppling.", true)}
            ${consentItem("storage", "Lagring (365 dagar)", "Dina resultat sparas för att du ska kunna gå tillbaka till dem. Valfritt.", false)}

            <div class="bg-gray-50 rounded-2xl p-4 text-xs text-gray-500 space-y-1">
                <p>✓ Inga data säljs till tredje part</p>
                <p>✓ Du har rätt till uttag och radering (Art. 15–17 GDPR)</p>
                <p>✓ Data anonymiseras automatiskt efter lagringperioden</p>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-lg mx-auto bg-white border-t p-4">
            <button onclick="${ok ? "startTest()" : ""}"
                class="w-full py-4 rounded-xl font-bold text-base transition-all ${ok ? "text-white card-hover" : "bg-gray-100 text-gray-400 cursor-not-allowed"}"
                style="${ok ? "background:linear-gradient(135deg,#6366F1,#8B5CF6)" : ""}"
                ${!ok ? "disabled" : ""}>
                ${ok ? "Acceptera och fortsätt" : "Godkänn obligatoriska samtycken"}
            </button>
        </div>
    </div>`;
}

function consentItem(id, title, desc, required) {
    const checked = consents[id];
    return `
    <label class="flex items-start gap-4 bg-white border-2 rounded-2xl p-4 cursor-pointer transition-all ${checked ? "border-indigo-400 bg-indigo-50" : "border-gray-100"}">
        <input type="checkbox" ${checked?"checked":""} onchange="toggleConsent('${id}')" />
        <div>
            <div class="flex items-center gap-2">
                <span class="font-semibold text-gray-900 text-sm">${title}</span>
                <span class="tag text-xs ${required ? "bg-red-100 text-red-700" : "bg-gray-100 text-gray-600"}">${required?"Obligatorisk":"Valfri"}</span>
            </div>
            <p class="text-xs text-gray-500 mt-1">${desc}</p>
        </div>
    </label>`;
}

function renderQuestion() {
    const q = QUESTIONS[qIdx];
    const prog = ((qIdx + 1) / QUESTIONS.length) * 100;
    const d = DIM[q.dim];
    const LABELS = ["", "Stämmer inte alls", "Stämmer dåligt", "Neutral", "Stämmer ganska bra", "Stämmer helt"];

    return `
    <div class="min-h-screen bg-gray-50">
        <!-- Progress header -->
        <div class="sticky top-0 bg-white border-b z-10">
            <div class="px-4 pt-3 pb-2">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-semibold text-gray-500">FRÅGA ${qIdx+1} AV ${QUESTIONS.length}</span>
                    <span class="text-xs font-bold" style="color:${d.color}">${d.sv.toUpperCase()}</span>
                </div>
                <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                    <div class="h-full rounded-full progress-bar" style="width:${prog}%; background:linear-gradient(90deg,#6366F1,#8B5CF6)"></div>
                </div>
            </div>
        </div>

        <!-- Question card -->
        <div class="px-4 pt-6 pb-4">
            <div class="rounded-3xl p-6 mb-5 shadow-md" style="background:${d.light}; border:1px solid ${d.color}22">
                <div class="w-10 h-10 rounded-2xl flex items-center justify-center mb-3" style="background:${d.color}22">
                    <i data-lucide="${d.icon}" class="w-5 h-5" style="color:${d.color}"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-900 leading-snug">${q.text}</h2>
            </div>

            <!-- Likert scale -->
            <div class="space-y-2.5">
                ${[5,4,3,2,1].map(v=>`
                <button class="likert-btn ${answers[q.id]===v?"selected":""}" onclick="answer(${q.id},${v})">
                    <div class="w-9 h-9 rounded-xl flex items-center justify-center font-bold text-sm flex-shrink-0 transition-all"
                         style="background:${answers[q.id]===v ? d.color : "#f3f4f6"}; color:${answers[q.id]===v ? "white" : "#6b7280"}">
                        ${v}
                    </div>
                    <span class="font-medium text-sm ${answers[q.id]===v?"text-indigo-900":"text-gray-700"}">${LABELS[v]}</span>
                </button>`).join("")}
            </div>
        </div>

        <!-- Back button -->
        ${qIdx > 0 ? `
        <div class="px-4 pb-6">
            <button onclick="prevQ()" class="w-full py-3 rounded-xl bg-gray-100 text-gray-600 font-semibold text-sm card-hover">
                ← Föregående fråga
            </button>
        </div>` : ""}
    </div>`;
}

function renderResults() {
    const dims = ["E","A","C","N","O"];

    // Compute display scores
    const display = {};
    dims.forEach(d => {
        display[d] = d === "N" ? getNScore(scores[d]) : scores[d];
    });

    const headline = generateHeadline({ ...scores, N_display: display.N });

    return `
    <div class="min-h-screen bg-gray-50 slide-in-up pb-10">

        <!-- Hero -->
        <div class="text-white px-5 pt-10 pb-16 text-center"
             style="background:linear-gradient(135deg,#6366F1,#8B5CF6,#EC4899)">
            <div class="w-14 h-14 bg-white/20 rounded-2xl mx-auto mb-4 flex items-center justify-center">
                <i data-lucide="star" class="w-7 h-7 text-white"></i>
            </div>
            <h1 class="text-3xl font-black mb-2">Din profil</h1>
            <p class="text-white/85 text-sm font-medium capitalize">${headline}</p>
        </div>

        <div class="px-4 -mt-8 space-y-4">

            <!-- Radar chart -->
            <div class="bg-white rounded-3xl p-5 shadow-md">
                <h2 class="text-base font-bold text-gray-900 mb-1">OCEAN-profil</h2>
                <p class="text-xs text-gray-500 mb-4">Ditt resultat jämfört med normalpopulation (percentil)</p>
                <div class="radar-container">
                    <canvas id="radarChart" width="300" height="300"></canvas>
                </div>
            </div>

            <!-- Dimension cards -->
            <div class="bg-white rounded-3xl p-5 shadow-md">
                <h2 class="text-base font-bold text-gray-900 mb-4">Dina dimensioner</h2>
                ${dims.map(d => {
                    const sc = display[d];
                    const info = DIM[d];
                    const lvl = getLevel(sc);
                    const desc = DESC[d][lvl];
                    return `
                    <div class="dim-card" style="border-left:4px solid ${info.color}">
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-xl flex items-center justify-center" style="background:${info.light}">
                                    <i data-lucide="${info.icon}" class="w-4 h-4" style="color:${info.color}"></i>
                                </div>
                                <span class="font-bold text-gray-900 text-sm">${info.sv}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="tag" style="background:${info.light};color:${info.color}">${desc.tag}</span>
                                <span class="font-black text-lg" style="color:${info.color}">${Math.round(sc)}</span>
                            </div>
                        </div>
                        <div class="score-bar-bg mb-3">
                            <div class="score-bar-fill dim-bar" style="width:${sc}%;background:${info.color}"></div>
                        </div>
                        <p class="text-xs text-gray-600 leading-relaxed">${desc.text}</p>
                    </div>`;
                }).join("")}
            </div>

            <!-- Key strengths -->
            <div class="insights-card shadow-md">
                <div class="flex items-center gap-2 mb-3">
                    <i data-lucide="zap" class="w-5 h-5 text-yellow-300"></i>
                    <h2 class="text-base font-bold">Dina styrkor</h2>
                </div>
                <ul class="space-y-2">
                    ${buildStrengths(display).map(s=>`
                    <li class="flex items-start gap-2">
                        <span class="text-yellow-300 mt-0.5">✦</span>
                        <span class="text-white/90 text-sm">${s}</span>
                    </li>`).join("")}
                </ul>
            </div>

            <!-- Scientific note -->
            <div class="bg-white rounded-3xl p-5 shadow-md">
                <div class="flex items-start gap-3">
                    <i data-lucide="flask-conical" class="w-5 h-5 text-indigo-500 flex-shrink-0 mt-0.5"></i>
                    <div>
                        <h3 class="font-bold text-gray-900 text-sm mb-1">Om resultaten</h3>
                        <p class="text-xs text-gray-600 leading-relaxed">
                            Dina poäng är beräknade med IPIP-50-instrumentet och visar var du befinner dig relativt en normalpopulation (percentil 0–100). Inga svar är rätt eller fel — Big Five mäter stilar, inte förmågor.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <button onclick="share()" class="w-full text-white py-5 rounded-2xl font-bold shadow-xl card-hover"
                style="background:linear-gradient(135deg,#6366F1,#8B5CF6)">
                Dela resultat
            </button>
            <button onclick="restart()" class="w-full py-4 rounded-2xl font-semibold bg-white text-gray-700 shadow card-hover">
                Gör om testet
            </button>
        </div>
    </div>`;
}

// ─────────────────────────────────────────────
// STRENGTHS BUILDER
// ─────────────────────────────────────────────
function buildStrengths(display) {
    const s = [];
    if (display.E >= 60) s.push("Du bygger nätverk och relationer med naturlig lätthet.");
    if (display.E <= 40) s.push("Du lyssnar aktivt och tänker innan du agerar — en sällsynt förmåga.");
    if (display.A >= 60) s.push("Din empati gör dig till en uppskattad kollega och vän.");
    if (display.A <= 40) s.push("Du är direkt och ärlig — folk vet var de har dig.");
    if (display.C >= 60) s.push("Du levererar konsekvent hög kvalitet och kan litas på.");
    if (display.C <= 40) s.push("Din spontanitet och flexibilitet är en tillgång i föränderliga miljöer.");
    if (display.N >= 60) s.push("Din emotionella djup gör dig till en empatisk och lyhörd person.");
    if (display.N <= 40) s.push("Ditt lugn under press smittar av sig och stabiliserar team.");
    if (display.O >= 60) s.push("Din kreativitet och nyfikenhet driver innovation och problemlösning.");
    if (display.O <= 40) s.push("Din praktiska och konkreta approach levererar pålitliga resultat.");
    return s.length > 0 ? s.slice(0, 4) : ["Du har en balanserad och mångsidig personlighet — en styrka i sig."];
}

// ─────────────────────────────────────────────
// SCORING
// ─────────────────────────────────────────────
function calcScores() {
    const raw = { E:0, A:0, C:0, N:0, O:0 };
    const counts = { E:0, A:0, C:0, N:0, O:0 };

    QUESTIONS.forEach(q => {
        let v = answers[q.id] || 3;
        if (q.k === "-") v = 6 - v;
        raw[q.dim] += v;
        counts[q.dim]++;
    });

    const result = {};
    Object.keys(raw).forEach(d => {
        const mean = raw[d] / counts[d]; // 1–5
        result[d] = Math.round(((mean - 1) / 4) * 100); // 0–100
    });
    return result;
}

// ─────────────────────────────────────────────
// CHART
// ─────────────────────────────────────────────
function drawChart(display) {
    setTimeout(() => {
        const canvas = document.getElementById("radarChart");
        if (!canvas) return;
        if (radarChart) radarChart.destroy();

        radarChart = new Chart(canvas, {
            type: "radar",
            data: {
                labels: ["Extraversion", "Vänlighet", "Samvetsgrannhet", "Em. stabilitet", "Öppenhet"],
                datasets: [{
                    label: "Din profil",
                    data: ["E","A","C","N","O"].map(d => display[d]),
                    backgroundColor: "rgba(99,102,241,0.15)",
                    borderColor: "#6366F1",
                    borderWidth: 2.5,
                    pointBackgroundColor: ["#6366F1","#10B981","#F59E0B","#EF4444","#8B5CF6"],
                    pointRadius: 5,
                    pointHoverRadius: 7,
                }]
            },
            options: {
                responsive: true,
                scales: {
                    r: {
                        min: 0, max: 100,
                        ticks: { stepSize: 25, font: { size: 9 }, backdropColor: "transparent" },
                        pointLabels: { font: { size: 10, weight: "bold" }, color: "#374151" },
                        grid: { color: "#e5e7eb" },
                        angleLines: { color: "#e5e7eb" }
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    }, 150);
}

// ─────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────
function go(v) { view = v; render(); }

function toggleConsent(id) {
    consents[id] = !consents[id];
    render();
}

function startTest() {
    qIdx = 0;
    answers = {};
    view = "question";
    render();
}

function answer(id, val) {
    answers[id] = val;
    setTimeout(() => {
        if (qIdx < QUESTIONS.length - 1) {
            qIdx++;
            render();
        } else {
            scores = calcScores();
            view = "results";
            render();
        }
    }, 280);
}

function prevQ() {
    if (qIdx > 0) { qIdx--; render(); }
}

function restart() {
    answers = {};
    scores = null;
    qIdx = 0;
    view = "start";
    render();
}

function share() {
    const dims = ["E","A","C","N","O"];
    const display = {};
    dims.forEach(d => { display[d] = d==="N" ? getNScore(scores[d]) : scores[d]; });
    const lines = dims.map(d => `${DIM[d].sv}: ${Math.round(display[d])}/100`).join("\n");
    const text = `Min ${BRAND} Big Five-profil:\n\n${lines}\n\nGör testet på persona.app`;

    if (navigator.share) {
        navigator.share({ title: "Min personlighetsprofil", text });
    } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
            alert("Kopierat till urklipp! ✓");
        });
    } else {
        alert(text);
    }
}

// ─────────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────────
function render() {
    const app = document.getElementById("app");
    if (view === "start")     app.innerHTML = renderStart();
    if (view === "consent")   app.innerHTML = renderConsent();
    if (view === "question")  app.innerHTML = renderQuestion();
    if (view === "results") {
        app.innerHTML = renderResults();
        const dims = ["E","A","C","N","O"];
        const display = {};
        dims.forEach(d => { display[d] = d==="N" ? getNScore(scores[d]) : scores[d]; });
        drawChart(display);
    }
    if (typeof lucide !== "undefined") lucide.createIcons();
    window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
