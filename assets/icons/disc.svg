<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <title>DISC Personality Assessment</title>

    <!-- Outer circle border -->
    <circle cx="32" cy="32" r="30" fill="none" stroke="#e5e7eb" stroke-width="2"/>

    <!-- Four quadrants -->
    <!-- D - Dominance (Red) - Top Right -->
    <path d="M32,32 L32,2 A30,30 0 0,1 62,32 Z" fill="#FF4444" opacity="0.9"/>

    <!-- I - Influence (Yellow) - Bottom Right -->
    <path d="M62,32 L32,32 L32,62 A30,30 0 0,0 62,32 Z" fill="#FFD700" opacity="0.9"/>

    <!-- S - Steadiness (Green) - Bottom Left -->
    <path d="M32,62 L2,32 A30,30 0 0,1 32,62 Z" fill="#44AA44" opacity="0.9"/>

    <!-- C - Conscientiousness (Blue) - Top Left -->
    <path d="M2,32 L32,2 A30,30 0 0,0 2,32 Z" fill="#4444FF" opacity="0.9"/>

    <!-- Center circle -->
    <circle cx="32" cy="32" r="8" fill="white"/>

    <!-- Labels -->
    <text x="32" y="18" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="sans-serif">D</text>
    <text x="46" y="38" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="sans-serif">I</text>
    <text x="32" y="54" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="sans-serif">S</text>
    <text x="18" y="38" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="sans-serif">C</text>
</svg>
