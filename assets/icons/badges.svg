<svg xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- GDPR Compliant Badge -->
        <symbol id="badge-gdpr" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="#10b981"/>
            <circle cx="50" cy="50" r="44" fill="none" stroke="white" stroke-width="2"/>
            <path d="M50,20 L50,45 L70,45" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
            <circle cx="50" cy="45" r="3" fill="white"/>
            <text x="50" y="68" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="sans-serif">GDPR</text>
            <text x="50" y="82" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif">Compliant</text>
        </symbol>

        <!-- SSL Secure Badge -->
        <symbol id="badge-secure" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="#059669"/>
            <!-- Lock shackle -->
            <path d="M50,20 C50,20 65,25 65,40" stroke="#047857" stroke-width="4" fill="none"/>
            <path d="M50,20 C50,20 35,25 35,40" stroke="#047857" stroke-width="4" fill="none"/>
            <!-- Lock body -->
            <rect x="35" y="40" width="30" height="30" rx="3" fill="#047857"/>
            <!-- Checkmark -->
            <path d="M43,55 L47,60 L57,48" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="50" y="90" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="sans-serif">SECURE</text>
        </symbol>

        <!-- Science Validated Badge -->
        <symbol id="badge-validated" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="#3b82f6"/>
            <circle cx="50" cy="50" r="44" fill="none" stroke="white" stroke-width="2" stroke-dasharray="4 2"/>
            <circle cx="50" cy="50" r="20" fill="none" stroke="white" stroke-width="3"/>
            <!-- Data points -->
            <circle cx="50" cy="35" r="3" fill="white"/>
            <circle cx="65" cy="50" r="3" fill="white"/>
            <circle cx="50" cy="65" r="3" fill="white"/>
            <circle cx="35" cy="50" r="3" fill="white"/>
            <!-- Connection lines -->
            <line x1="50" y1="35" x2="65" y2="50" stroke="white" stroke-width="2"/>
            <line x1="65" y1="50" x2="50" y2="65" stroke="white" stroke-width="2"/>
            <text x="50" y="92" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="sans-serif">VALIDATED</text>
        </symbol>

        <!-- Privacy Shield Badge -->
        <symbol id="badge-privacy" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="#0891b2"/>
            <!-- Shield outline -->
            <path d="M50,15 L70,25 L70,50 C70,65 50,80 50,80 C50,80 30,65 30,50 L30,25 Z" fill="#0284c7" stroke="white" stroke-width="2"/>
            <!-- Checkmark -->
            <path d="M40,50 L45,55 L60,40" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="50" y="95" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="sans-serif">PRIVATE</text>
        </symbol>
    </defs>
</svg>
