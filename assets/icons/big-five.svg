<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <title>Big Five Personality Assessment</title>
    <defs>
        <linearGradient id="bigFiveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Connection lines (behind circles) -->
    <line x1="32" y1="16" x2="16" y2="32" stroke="url(#bigFiveGradient)" stroke-width="2" opacity="0.3"/>
    <line x1="32" y1="16" x2="48" y2="32" stroke="url(#bigFiveGradient)" stroke-width="2" opacity="0.3"/>
    <line x1="16" y1="32" x2="24" y2="48" stroke="url(#bigFiveGradient)" stroke-width="2" opacity="0.3"/>
    <line x1="48" y1="32" x2="40" y2="48" stroke="url(#bigFiveGradient)" stroke-width="2" opacity="0.3"/>
    <line x1="24" y1="48" x2="40" y2="48" stroke="url(#bigFiveGradient)" stroke-width="2" opacity="0.3"/>

    <!-- Five trait circles -->
    <circle cx="32" cy="16" r="7" fill="url(#bigFiveGradient)"/>
    <circle cx="16" cy="32" r="7" fill="url(#bigFiveGradient)"/>
    <circle cx="48" cy="32" r="7" fill="url(#bigFiveGradient)"/>
    <circle cx="24" cy="48" r="7" fill="url(#bigFiveGradient)"/>
    <circle cx="40" cy="48" r="7" fill="url(#bigFiveGradient)"/>
</svg>
