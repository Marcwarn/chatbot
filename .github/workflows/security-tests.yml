name: Security Test Suite

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  schedule:
    # Run security tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  security-tests:
    name: Security Vulnerability Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-timeout bcrypt
          pip install psutil  # For memory monitoring

      - name: Run Security Tests
        run: |
          pytest tests/test_security.py \
            -v \
            --tb=short \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --timeout=300 \
            --maxfail=5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}

      - name: Run Integration Tests
        run: |
          pytest tests/test_integration.py \
            -v \
            --tb=short \
            --cov=. \
            --cov-append \
            --cov-report=xml \
            --timeout=300
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run Performance Tests
        run: |
          pytest tests/test_performance.py \
            -v \
            --tb=short \
            --timeout=600 \
            -k "not test_concurrent"  # Skip long-running tests in CI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage.xml
          flags: security-tests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=70
        if: always()

  vulnerability-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit safety

      - name: Run pip-audit
        run: |
          pip-audit --desc --format json --output pip-audit-report.json
        continue-on-error: true

      - name: Run Safety check
        run: |
          safety check --json --output safety-report.json
        continue-on-error: true

      - name: Upload vulnerability reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: vulnerability-reports
          path: |
            pip-audit-report.json
            safety-report.json

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [security-tests, vulnerability-scan]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v3
        continue-on-error: true

      - name: Generate security summary
        run: |
          echo "# Security Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All 22 vulnerabilities tested" >> $GITHUB_STEP_SUMMARY
          echo "- 🔒 CRITICAL: 9 vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- 🟠 HIGH: 5 vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- 🟡 MEDIUM: 8 vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Suites Run" >> $GITHUB_STEP_SUMMARY
          echo "1. **Security Tests** (test_security.py)" >> $GITHUB_STEP_SUMMARY
          echo "2. **Integration Tests** (test_integration.py)" >> $GITHUB_STEP_SUMMARY
          echo "3. **Performance Tests** (test_performance.py)" >> $GITHUB_STEP_SUMMARY
          echo "4. **Dependency Scan** (pip-audit + safety)" >> $GITHUB_STEP_SUMMARY

      - name: Check for critical failures
        run: |
          if [ "${{ needs.security-tests.result }}" != "success" ]; then
            echo "❌ SECURITY TESTS FAILED - Do not merge until resolved" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # Require all security tests to pass before allowing merge
  security-gate:
    name: Security Gate (Required)
    runs-on: ubuntu-latest
    needs: [security-tests]
    if: always()

    steps:
      - name: Check security test results
        run: |
          if [ "${{ needs.security-tests.result }}" != "success" ]; then
            echo "::error::Security tests failed. Review and fix vulnerabilities before merging."
            exit 1
          fi

      - name: Security gate passed
        run: |
          echo "✅ All security tests passed. Safe to merge."
