name: Deploy to Staging

on:
  push:
    branches:
      - staging
      - develop

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run all tests
        env:
          ADMIN_PASSWORD_HASH: ${{ secrets.STAGING_ADMIN_HASH }}
          ADMIN_API_KEY: ${{ secrets.STAGING_API_KEY }}
        run: |
          pytest tests/ -v

  deploy:
    name: Deploy to Vercel Staging
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_SCOPE }}

      - name: Wait for deployment
        run: sleep 30

      - name: Run smoke tests
        run: |
          python tests/smoke_tests.py --url https://persona-assessment-staging.vercel.app

      - name: Notify success
        if: success()
        run: |
          echo "✅ Staging deployment successful!"
          echo "🌐 URL: https://persona-assessment-staging.vercel.app"
